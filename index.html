<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias Israel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb; --bg2: #edeade; --ink: #1a1710; --ink2: #4a4535;
    --ink3: #8a8070; --rule: #c8c0aa; --accent: #b5000a; --card: #faf8f2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'Source Serif 4', Georgia, serif; min-height: 100vh; }

  .masthead { background: var(--ink); border-bottom: 3px solid var(--accent); }
  .masthead-inner { max-width: 1200px; margin: 0 auto; padding: 24px 32px 0; }
  .masthead-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #666; margin-bottom: 6px; }
  .site-title { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 700; letter-spacing: -1px; color: #fff; }
  .site-title span { color: var(--accent); }
  .masthead-meta { text-align: right; font-size: 11px; color: #555; line-height: 1.9; }
  .masthead-meta b { color: #999; }
  .masthead-rule { border: none; border-top: 1px solid #252218; }
  .masthead-nav { display: flex; overflow-x: auto; scrollbar-width: none; }
  .masthead-nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    background: transparent; border: none; color: #555; font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 15px;
    cursor: pointer; font-family: inherit; white-space: nowrap;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .nav-btn:hover { color: #aaa; }
  .nav-btn.active { color: #fff; border-bottom-color: var(--accent); }

  .toolbar { background: var(--bg2); border-bottom: 1px solid var(--rule); padding: 9px 32px; }
  .toolbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .refresh-btn {
    background: var(--accent); color: #fff; border: none; padding: 7px 18px;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .refresh-btn:hover { background: #8a0008; }
  .refresh-btn:disabled { background: #999; cursor: not-allowed; }
  .status { font-size: 12px; color: var(--ink3); font-style: italic; }
  .last-upd { margin-left: auto; font-size: 11px; color: var(--ink3); }

  .prog-wrap { height: 2px; background: var(--rule); display: none; }
  .prog-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.35s ease; }

  .main { max-width: 1200px; margin: 0 auto; padding: 32px 32px; }

  .source-section { margin-bottom: 44px; animation: fadeUp 0.3s ease both; }
  .source-section.hidden { display: none; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .source-header {
    display: flex; align-items: center; gap: 12px;
    padding-bottom: 9px; border-bottom: 2px solid var(--ink); margin-bottom: 1px;
  }
  .source-name { font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 600; }
  .source-badge { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink3); border: 1px solid var(--rule); padding: 2px 7px; }
  .source-link { margin-left: auto; font-size: 11px; color: var(--ink3); text-decoration: none; }
  .source-link:hover { color: var(--accent); }

  .articles-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 1px; background: var(--rule); border: 1px solid var(--rule);
  }
  .article-card { background: var(--card); padding: 15px 17px; transition: background 0.15s; }
  .article-card:hover { background: #fff; }
  .article-time { font-size: 10px; letter-spacing: 1.5px; color: var(--ink3); text-transform: uppercase; margin-bottom: 5px; }
  .article-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
  .article-title a { color: var(--ink); text-decoration: none; }
  .article-title a:hover { color: var(--accent); text-decoration: underline; }
  .article-desc { font-size: 12px; line-height: 1.7; color: var(--ink2); font-style: italic; }
  .article-desc.loading { color: var(--ink3); }

  .state-card { padding: 24px 18px; text-align: center; font-style: italic; font-size: 12px; background: var(--card); border: 1px solid var(--rule); color: var(--ink3); }
  .state-card.error { background: #fff8f8; border-color: #f5cccc; color: #aa0000; font-style: normal; text-align: left; padding: 12px 16px; }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--rule); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { background: var(--ink); color: #444; text-align: center; padding: 16px; font-size: 11px; letter-spacing: 1px; margin-top: 20px; }

  @media (max-width: 640px) {
    .site-title { font-size: 30px; }
    .main, .toolbar { padding-left: 16px; padding-right: 16px; }
    .masthead-inner { padding: 18px 16px 0; }
    .masthead-top { flex-direction: column; align-items: flex-start; gap: 8px; }
    .articles-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div class="masthead-top">
      <div>
        <div class="eyebrow">Monitor de Prensa · Israel &amp; Medio Oriente</div>
        <div class="site-title">Noticias <span>Israel</span></div>
      </div>
      <div class="masthead-meta">
        <div id="the-date"></div>
        <div id="the-time"></div>
        <b>9 noticias por medio · idioma original</b>
      </div>
    </div>
    <hr class="masthead-rule">
    <nav class="masthead-nav" id="nav">
      <button class="nav-btn active" onclick="filter('all',this)">Todos</button>
    </nav>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↻ Actualizar</button>
    <span class="status" id="status">Presioná Actualizar para cargar</span>
    <span class="last-upd" id="last-upd"></span>
  </div>
</div>
<div class="prog-wrap" id="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>

<main class="main" id="main"></main>

<footer>Noticias Israel &nbsp;·&nbsp; RSS oficial de cada medio &nbsp;·&nbsp; Sin servidor</footer>

<script>
// ── FUENTES ───────────────────────────────────────────────────────────────────
// type "rss"     → usa proxies RSS estándar
// type "scrape"  → usa función scrapeUrl() personalizada
const SOURCES = [
  {
    id: "timesofisrael", name: "Times of Israel", lang: "en", type: "rss",
    site: "https://www.timesofisrael.com",
    feeds: [
      "https://www.timesofisrael.com/feed/",
      "https://feeds.feedburner.com/TimesofIsrael",
    ]
  },
  {
    id: "jpost", name: "Jerusalem Post", lang: "en", type: "rss",
    site: "https://www.jpost.com",
    feeds: [
      "https://www.jpost.com/rss/rssfeedsfrontpage.aspx",
      "https://rss.jpost.com/rss/rssfeedsbreaking.aspx",
      "https://rss.jpost.com/rss/rssfeedsisraelinews.aspx",
    ]
  },
  {
    id: "haaretz", name: "הארץ", lang: "iw", type: "rss",
    site: "https://www.haaretz.co.il",
    feeds: [
      "https://www.haaretz.co.il/srv/rss---feedly",
    ]
  },
  {
    id: "ynet", name: "Ynet", lang: "iw", type: "rss",
    site: "https://www.ynet.co.il",
    feeds: [
      "https://www.ynet.co.il/Integration/StoryRss2.xml",
      "https://www.ynet.co.il/Integration/StoryRss1854.xml",
    ]
  },
  {
    id: "israelhayom", name: "Israel Hayom", lang: "iw", type: "rss",
    site: "https://www.israelhayom.co.il",
    feeds: [
      "https://www.israelhayom.co.il/rss/rss.xml",
    ]
  },
  {
    id: "maariv", name: "Maariv", lang: "iw", type: "rss",
    site: "https://www.maariv.co.il",
    feeds: [
      "https://www.maariv.co.il/Rss/RssChadashot",
      "https://www.maariv.co.il/rss/rssnews",
    ]
  },
  {
    // Kan News: su página usa JS dinámico, los proxies HTML no funcionan.
    // Google News RSS en hebreo filtrando por "כאן" sí funciona de forma confiable.
    id: "kan", name: "Kan News", lang: "iw", type: "rss",
    site: "https://www.kan.org.il",
    feeds: [
      "https://news.google.com/rss/search?q=site:kan.org.il&hl=iw&gl=IL&ceid=IL:iw",
      "https://news.google.com/rss/search?q=%22%D7%9B%D7%90%D7%9F+%D7%97%D7%93%D7%A9%D7%95%D7%AA%22+site:kan.org.il&hl=iw&gl=IL&ceid=IL:iw",
    ]
  },
  {
    // N12 (Mako): página JS-renderizada, los proxies HTML devuelven HTML vacío.
    // Google News RSS filtrando por n12.co.il / mako.co.il es la alternativa confiable.
    id: "n12", name: "N12", lang: "iw", type: "rss",
    site: "https://www.n12.co.il",
    feeds: [
      "https://news.google.com/rss/search?q=site:n12.co.il&hl=iw&gl=IL&ceid=IL:iw",
      "https://news.google.com/rss/search?q=site:mako.co.il+%D7%97%D7%93%D7%A9%D7%95%D7%AA&hl=iw&gl=IL&ceid=IL:iw",
    ]
  },
  {
    // ערוץ 14: bloquea todo acceso directo con 403. Google News RSS es la única opción.
    id: "c14", name: "ערוץ 14", lang: "iw", type: "rss",
    site: "https://www.c14.co.il",
    feeds: [
      "https://news.google.com/rss/search?q=site:c14.co.il&hl=iw&gl=IL&ceid=IL:iw",
      "https://news.google.com/rss/search?q=%22%D7%A2%D7%A8%D7%95%D7%A5+14%22+%D7%97%D7%93%D7%A9%D7%95%D7%AA&hl=iw&gl=IL&ceid=IL:iw",
    ]
  },
];

// ── PROXIES RSS ───────────────────────────────────────────────────────────────
const PROXIES = [
  async (feedUrl) => {
    const res = await fetch(`https://api.rss2json.com/v1/api.json?count=9&rss_url=${encodeURIComponent(feedUrl)}`);
    if (!res.ok) throw new Error(`rss2json HTTP ${res.status}`);
    const data = await res.json();
    if (data.status !== "ok") throw new Error(`rss2json: ${data.message}`);
    return data.items.slice(0,9).map(item => ({
      title: stripHtml(item.title || ""),
      link: item.link || "",
      pubDate: item.pubDate || "",
    }));
  },
  async (feedUrl) => {
    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(feedUrl)}`);
    if (!res.ok) throw new Error(`allorigins HTTP ${res.status}`);
    return parseXML(await res.text());
  },
  async (feedUrl) => {
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(feedUrl)}`);
    if (!res.ok) throw new Error(`corsproxy HTTP ${res.status}`);
    return parseXML(await res.text());
  },
  // Proxy adicional — útil para sitios israelíes que bloquean los anteriores
  async (feedUrl) => {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`);
    if (!res.ok) throw new Error(`allorigins/get HTTP ${res.status}`);
    const data = await res.json();
    if (!data.contents) throw new Error("allorigins/get: sin contenido");
    return parseXML(data.contents);
  },
];

// ── PARSEAR XML ───────────────────────────────────────────────────────────────
function parseXML(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  if (doc.querySelector("parsererror")) throw new Error("XML inválido");
  const items = Array.from(doc.querySelectorAll("item")).slice(0, 9);
  if (!items.length) throw new Error("Sin artículos");
  return items.map(item => ({
    title:   stripHtml(item.querySelector("title")?.textContent || ""),
    link:    item.querySelector("link")?.textContent || "",
    pubDate: item.querySelector("pubDate")?.textContent || "",
  }));
}

function stripHtml(str) {
  return str
    .replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1")
    .replace(/<[^>]+>/g, "")
    .replace(/&lt;/g,"<").replace(/&gt;/g,">")
    .replace(/&amp;/g,"&").replace(/&nbsp;/g," ")
    .replace(/&#[0-9]+;/g,"").replace(/&quot;/g,'"')
    .trim();
}

function formatDate(str) {
  if (!str) return "";
  try {
    const d = new Date(str);
    if (isNaN(d)) return "";
    return d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}) +
           " · " + d.toLocaleDateString("es-AR",{day:"numeric",month:"short"});
  } catch { return ""; }
}

// ── CARGAR UN FEED ────────────────────────────────────────────────────────────
async function loadFeed(source) {
  const grid = document.getElementById(`grid-${source.id}`);
  let lastError = "";

  for (const feedUrl of source.feeds) {
    for (const proxy of PROXIES) {
      try {
        const articles = await proxy(feedUrl);
        renderArticles(grid, articles);
        return;
      } catch(e) { lastError = e.message; }
    }
  }

  grid.innerHTML = `<div class="state-card error">⚠ No se pudo cargar ${source.name}<br><small style="color:#c66">${lastError}</small></div>`;
}

function renderArticles(grid, articles) {
  grid.innerHTML = articles.map(a => `
    <div class="article-card">
      ${a.pubDate ? `<div class="article-time">${formatDate(a.pubDate)}</div>` : ""}
      <div class="article-title">
        <a href="${a.link || "#"}" target="_blank" rel="noopener">${a.title || "Sin título"}</a>
      </div>
    </div>`).join("");
}

// ── FILTRO ────────────────────────────────────────────────────────────────────
function filter(id, btn) {
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  document.querySelectorAll(".source-section").forEach(s => {
    s.classList.toggle("hidden", id !== "all" && s.dataset.id !== id);
  });
}

// ── CONSTRUIR LAYOUT ──────────────────────────────────────────────────────────
function build() {
  const main = document.getElementById("main");
  const nav  = document.getElementById("nav");
  SOURCES.forEach(src => {
    const btn = document.createElement("button");
    btn.className = "nav-btn"; btn.textContent = src.name; btn.id = `nav-${src.id}`;
    btn.onclick = () => filter(src.id, btn);
    nav.appendChild(btn);

    const sec = document.createElement("section");
    sec.className = "source-section"; sec.id = `sec-${src.id}`; sec.dataset.id = src.id;
    sec.innerHTML = `
      <div class="source-header">
        <span class="source-name">${src.name}</span>
        <span class="source-badge">${src.lang === "en" ? "EN" : "עברית"}</span>
        <a class="source-link" href="${src.site}" target="_blank" rel="noopener">↗ ${src.site.replace("https://www.","")}</a>
      </div>
      <div class="articles-grid" id="grid-${src.id}">
        <div class="state-card"><span class="spinner"></span>Esperando...</div>
      </div>`;
    main.appendChild(sec);
  });
}

// ── CARGAR TODO ───────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById("refresh-btn");
  const prog = document.getElementById("prog-bar");
  const progWrap = document.getElementById("prog-wrap");
  const status = document.getElementById("status");
  const lastUpd = document.getElementById("last-upd");

  btn.disabled = true; btn.textContent = "↻ Cargando...";
  progWrap.style.display = "block"; prog.style.width = "0%";

  SOURCES.forEach(s => {
    const g = document.getElementById(`grid-${s.id}`);
    if (g) g.innerHTML = `<div class="state-card"><span class="spinner"></span>Cargando ${s.name}...</div>`;
  });

  let done = 0;
  status.textContent = `0 / ${SOURCES.length} fuentes...`;

  await Promise.all(SOURCES.map(async src => {
    await loadFeed(src);
    done++;
    prog.style.width = Math.round(done/SOURCES.length*100) + "%";
    status.textContent = `${done} / ${SOURCES.length} fuentes cargadas`;
  }));

  const now = new Date();
  lastUpd.textContent = `Actualizado ${now.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}`;
  status.textContent = `${SOURCES.length} fuentes · ${now.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}`;
  btn.disabled = false; btn.textContent = "↻ Actualizar";
  setTimeout(() => { progWrap.style.display="none"; prog.style.width="0%"; }, 1000);
}

// ── RELOJ ─────────────────────────────────────────────────────────────────────
function tick() {
  const now = new Date();
  document.getElementById("the-date").textContent =
    now.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  document.getElementById("the-time").textContent =
    now.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

build(); tick(); setInterval(tick, 1000); loadAll();
</script>
</body>
</html>
