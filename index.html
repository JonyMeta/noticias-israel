<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias Israel · Monitor de Prensa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
<!-- Readability.js (Mozilla) via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mozilla/readability@0.5.0/Readability.js"></script>
<style>
  :root {
    --bg:#f5f2eb;--bg2:#edeade;--ink:#1a1710;--ink2:#4a4535;
    --ink3:#8a8070;--rule:#c8c0aa;--accent:#b5000a;--card:#faf8f2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Source Serif 4',Georgia,serif;min-height:100vh}

  /* ── HEADER ── */
  .masthead{background:var(--ink);border-bottom:3px solid var(--accent)}
  .masthead-inner{padding:16px 24px 0}
  .masthead-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px}
  .eyebrow{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#555;margin-bottom:4px}
  .site-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;letter-spacing:-1px;color:#fff}
  .site-title span{color:var(--accent)}
  .masthead-meta{text-align:right;font-size:10px;color:#555;line-height:1.8}
  .masthead-rule{border:none;border-top:1px solid #252218}
  .masthead-nav{display:flex;overflow-x:auto;scrollbar-width:none;gap:2px}
  .masthead-nav::-webkit-scrollbar{display:none}
  .nav-btn{background:transparent;border:none;color:#555;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 11px;cursor:pointer;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
  .nav-btn:hover{color:#aaa}
  .nav-btn.active{color:#fff;border-bottom-color:var(--accent)}

  /* ── TOOLBAR ── */
  .toolbar{background:var(--bg2);border-bottom:1px solid var(--rule);padding:6px 24px}
  .toolbar-inner{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .refresh-btn{background:var(--accent);color:#fff;border:none;padding:6px 14px;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:background .2s}
  .refresh-btn:hover{background:#8a0008}
  .refresh-btn:disabled{background:#999;cursor:not-allowed}
  .status{font-size:11px;color:var(--ink3);font-style:italic}
  .last-upd{margin-left:auto;font-size:10px;color:var(--ink3)}
  .prog-wrap{height:2px;background:var(--rule);display:none}
  .prog-bar{height:100%;background:var(--accent);width:0%;transition:width .35s ease}

  /* ── SPLIT LAYOUT ── */
  .app-body{display:flex;overflow:hidden;height:calc(100vh - var(--top-h, 140px) - 64px)}

  /* Panel izquierdo */
  .feeds-panel{
    width:100%;overflow-y:auto;padding:20px 24px;
    transition:width .4s cubic-bezier(.4,0,.2,1);
    flex-shrink:0;
  }
  .feeds-panel.narrow{ width:36% }

  /* Panel derecho: lector */
  .reader-panel{
    width:0;overflow:hidden;
    border-left:3px solid var(--accent);
    background:#fff;
    display:flex;flex-direction:column;
    transition:width .4s cubic-bezier(.4,0,.2,1);
    flex-shrink:0;
  }
  .reader-panel.open{ width:64% }

  /* Cabecera del lector */
  .reader-header{
    background:var(--ink);padding:10px 18px;
    display:flex;align-items:center;gap:12px;
    border-bottom:2px solid var(--accent);flex-shrink:0;
  }
  .reader-source-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);flex-shrink:0}
  .reader-headline{
    font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:#e8e4d0;
    flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .reader-ext{background:none;border:1px solid #444;color:#888;padding:3px 9px;font-size:10px;cursor:pointer;font-family:inherit;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:all .15s}
  .reader-ext:hover{border-color:#aaa;color:#fff}
  .reader-close{background:none;border:1px solid #444;color:#888;padding:3px 9px;font-size:10px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all .15s}
  .reader-close:hover{border-color:#f55;color:#f55}

  /* Contenido del lector */
  .reader-scroll{flex:1;overflow-y:auto;padding:32px 40px}

  .reader-loading{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;gap:16px;color:var(--ink3);font-style:italic;font-size:13px;
  }
  .reader-error{
    padding:32px 40px;
    color:#aa0000;font-size:13px;line-height:1.7;
  }
  .reader-error a{color:var(--accent)}

  /* Artículo renderizado */
  .reader-article{ max-width:640px;margin:0 auto }
  .reader-article h1{
    font-family:'Playfair Display',serif;font-size:26px;font-weight:700;
    line-height:1.3;color:var(--ink);margin-bottom:16px;
  }
  .reader-meta{font-size:11px;color:var(--ink3);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--rule);display:flex;gap:16px;flex-wrap:wrap}
  .reader-lead-img{width:100%;max-height:320px;object-fit:cover;margin-bottom:24px;border:1px solid var(--rule)}
  .reader-body{font-size:15px;line-height:1.8;color:var(--ink2)}
  .reader-body p{margin-bottom:1.2em}
  .reader-body h2,.reader-body h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--ink);margin:1.5em 0 .5em}
  .reader-body a{color:var(--accent)}
  .reader-body img{max-width:100%;height:auto;margin:1em 0}
  .reader-body blockquote{border-left:3px solid var(--accent);padding-left:16px;color:var(--ink3);font-style:italic;margin:1em 0}
  .reader-body ul,.reader-body ol{padding-left:1.5em;margin-bottom:1em}
  .reader-body li{margin-bottom:.4em}
  /* RTL para hebreo */
  .reader-body[dir="rtl"]{text-align:right}
  .reader-article[dir="rtl"] h1{text-align:right}

  /* Paywall */
  .paywall-banner{
    display:flex;align-items:center;gap:14px;
    background:#fff8f0;border:2px solid #e8a020;
    padding:16px 20px;margin-bottom:24px;
  }
  .paywall-icon{font-size:24px;flex-shrink:0}
  .paywall-text{flex:1;display:flex;flex-direction:column;gap:3px}
  .paywall-text strong{font-size:13px;color:var(--ink)}
  .paywall-text span{font-size:12px;color:var(--ink3)}
  .paywall-btn{
    background:var(--accent);color:#fff;border:none;
    padding:8px 16px;font-size:11px;letter-spacing:1px;
    text-decoration:none;white-space:nowrap;flex-shrink:0;
    font-family:inherit;cursor:pointer;transition:background .2s;
  }
  .paywall-btn:hover{background:#8a0008}
  .paywall-teaser{
    background:var(--bg);border-left:3px solid var(--rule);
    padding:16px 20px;font-size:14px;line-height:1.8;color:var(--ink2);
    font-style:italic;
  }
  .paywall-teaser[dir="rtl"]{border-left:none;border-right:3px solid var(--rule);text-align:right}
  .paywall-teaser-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;font-style:normal}

  /* ── NOTICIAS ── */
  .source-section{margin-bottom:36px;animation:fadeUp .3s ease both}
  .source-section.hidden{display:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .source-header{display:flex;align-items:center;gap:10px;padding-bottom:7px;border-bottom:2px solid var(--ink);margin-bottom:1px}
  .source-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600}
  .source-badge{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);border:1px solid var(--rule);padding:2px 5px}
  .source-link{margin-left:auto;font-size:10px;color:var(--ink3);text-decoration:none}
  .source-link:hover{color:var(--accent)}
  .articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule)}
  .feeds-panel.narrow .articles-grid{grid-template-columns:1fr}
  .article-card{background:var(--card);padding:11px 13px;cursor:pointer;transition:background .15s;border-left:3px solid transparent;user-select:none}
  .article-card:hover{background:#fff;border-left-color:var(--rule)}
  .article-card.active{background:#fff;border-left-color:var(--accent)}
  .article-time{font-size:9px;letter-spacing:1px;color:var(--ink3);margin-bottom:3px}
  .article-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;line-height:1.4;color:var(--ink)}
  .state-card{padding:18px 14px;text-align:center;font-style:italic;font-size:12px;background:var(--card);border:1px solid var(--rule);color:var(--ink3)}
  .state-card.error{background:#fff8f8;border-color:#f5cccc;color:#aa0000;font-style:normal;text-align:left;padding:9px 13px}
  .spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--rule);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
  .spinner-lg{width:28px;height:28px;border-width:3px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── PLAYER BAR ── */
  .player-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:1000;
    background:#0f0e0b;border-top:2px solid var(--accent);
    display:flex;align-items:center;height:60px;
    box-shadow:0 -4px 24px rgba(0,0,0,.5);
    padding:0 16px;gap:14px;
  }
  .pb-play{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;
    color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .18s;flex-shrink:0}
  .pb-play:hover{background:#8a0008}
  .pb-play.on{background:#1c7a2c}
  .pb-play.on:hover{background:#145a20}
  .pb-vol{-webkit-appearance:none;appearance:none;width:72px;height:3px;
    background:#333;outline:none;cursor:pointer;flex-shrink:0}
  .pb-vol::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;
    border-radius:50%;background:var(--accent);cursor:pointer}
  .pb-status{font-size:10px;color:#555;font-style:italic;min-width:60px;flex-shrink:0;letter-spacing:.3px}
  .pb-div{width:1px;height:36px;background:#2a2820;flex-shrink:0}
  .pb-sources{display:flex;align-items:center;gap:8px;overflow-x:auto;
    scrollbar-width:none;flex:1;padding:4px 0}
  .pb-sources::-webkit-scrollbar{display:none}
  .pb-src{
    display:flex;align-items:center;justify-content:center;
    padding:6px 16px;border-radius:4px;cursor:pointer;border:1px solid #2a2820;
    background:#161410;transition:all .15s;flex-shrink:0;user-select:none;
  }
  .pb-src:hover{background:#222018;border-color:#555}
  .pb-src.active{background:#1a1200;border-color:var(--accent)}
  .pb-src-name{
    font-size:12px;font-weight:600;letter-spacing:.5px;color:#888;
    text-transform:uppercase;white-space:nowrap;font-family:'Source Serif 4',serif;
  }
  .pb-src.active .pb-src-name{color:#e0b060}
  /* iframes deben ser "visibles" para que el browser permita autoplay de audio */
  .pb-iframes{
    position:fixed;bottom:60px;right:0;
    width:1px;height:1px;
    overflow:hidden;pointer-events:none;
    /* clip: queda invisible para el usuario pero no para el browser */
    clip:rect(0,0,0,0);
  }
  .pb-iframes iframe{
    width:320px;height:240px;border:none;
  }
  footer{display:none}

  @media(max-width:900px){
    .feeds-panel.narrow{width:0;padding:0;overflow:hidden}
    .reader-panel.open{width:100%}
  }
  @media(max-width:640px){
    .site-title{font-size:24px}
    .feeds-panel{padding:14px}
    .reader-scroll{padding:20px 18px}
    .masthead-inner,.toolbar{padding-left:14px;padding-right:14px}
    .masthead-top{flex-direction:column;align-items:flex-start;gap:5px}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
</head>
<body>

<header class="masthead" id="site-header">
  <div class="masthead-inner">
    <div class="masthead-top">
      <div>
        <div class="eyebrow">Monitor de Prensa · Israel &amp; Medio Oriente</div>
        <div class="site-title">Noticias <span>Israel</span></div>
      </div>
      <div class="masthead-meta">
        <div id="the-date"></div>
        <div id="the-time"></div>
        <b>13 fuentes · idioma original</b>
      </div>
    </div>
    <hr class="masthead-rule">
    <nav class="masthead-nav" id="nav">
      <button class="nav-btn active" onclick="filterSources('all',this)">Todos</button>
    </nav>
  </div>
</header>

<div class="toolbar" id="site-toolbar">
  <div class="toolbar-inner">
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↻ Actualizar</button>
    <span class="status" id="status">Presioná Actualizar para cargar</span>
    <span class="last-upd" id="last-upd"></span>
  </div>
</div>
<div class="prog-wrap" id="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>

<!-- BODY SPLIT -->
<div class="app-body" id="app-body">

  <div class="feeds-panel" id="feeds-panel">
    <!-- fuentes se insertan acá -->
  </div>

  <div class="reader-panel" id="reader-panel">
    <div class="reader-header">
      <span class="reader-source-tag" id="reader-source">—</span>
      <span class="reader-headline" id="reader-headline">—</span>
      <a class="reader-ext" id="reader-ext" href="#" target="_blank" rel="noopener">↗ Original</a>
      <button class="reader-close" onclick="closeReader()">✕</button>
    </div>
    <div class="reader-scroll" id="reader-scroll">
      <div class="reader-loading">
        <span class="spinner spinner-lg"></span>
        <span>Cargando artículo...</span>
      </div>
    </div>
  </div>

</div>

<!-- PLAYER BAR FIJA -->
<div class="pb-iframes" id="pb-iframes">
  <!-- iframes se insertan dinámicamente -->
</div>

<div class="player-bar" id="player-bar">

  <!-- Play / Pause -->
  <button class="pb-play" id="pb-play" onclick="pbToggle()">▶</button>

  <!-- Volumen -->
  <input class="pb-vol" type="range" min="0" max="1" step="0.05" value="0.8"
    id="pb-vol" oninput="pbSetVol(this.value)" title="Volumen">

  <!-- Estado -->
  <span class="pb-status" id="pb-status">—</span>

  <div class="pb-div"></div>

  <!-- Fuentes -->
  <div class="pb-sources" id="pb-sources">
    <!-- generado por JS -->
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// FUENTES
// ══════════════════════════════════════════════
const SOURCES = [
  { id:"timesofisrael", name:"Times of Israel", lang:"en", type:"rss", site:"https://www.timesofisrael.com",
    feeds:["https://www.timesofisrael.com/feed/","https://feeds.feedburner.com/TimesofIsrael"] },
  { id:"jpost", name:"Jerusalem Post", lang:"en", type:"rss", site:"https://www.jpost.com",
    feeds:["https://www.jpost.com/rss/rssfeedsfrontpage.aspx","https://rss.jpost.com/rss/rssfeedsbreaking.aspx"] },
  { id:"haaretz", name:"הארץ", lang:"iw", type:"rss", site:"https://www.haaretz.co.il",
    feeds:["https://www.haaretz.co.il/srv/rss---feedly"] },
  { id:"ynet", name:"Ynet", lang:"iw", type:"rss", site:"https://www.ynet.co.il",
    feeds:["https://www.ynet.co.il/Integration/StoryRss2.xml","https://www.ynet.co.il/Integration/StoryRss1854.xml"] },
  { id:"walla", name:"וואלה", lang:"iw", type:"rss", site:"https://news.walla.co.il",
    feeds:["https://rss.walla.co.il/feed/1?type=main","https://rss.walla.co.il/feed/2?type=breaking"] },
  { id:"israelhayom", name:"Israel Hayom", lang:"iw", type:"rss", site:"https://www.israelhayom.co.il",
    feeds:["https://www.israelhayom.co.il/rss/rss.xml"] },
  { id:"maariv", name:"Maariv", lang:"iw", type:"rss", site:"https://www.maariv.co.il",
    feeds:["https://www.maariv.co.il/Rss/RssChadashot","https://www.maariv.co.il/rss/rssnews"] },
  { id:"kan", name:"Kan News", lang:"iw", type:"rss", site:"https://www.kan.org.il",
    feeds:["https://news.google.com/rss/search?q=site:kan.org.il+when:1d&hl=iw&gl=IL&ceid=IL:iw",
           "https://news.google.com/rss/search?q=site:kan.org.il&hl=iw&gl=IL&ceid=IL:iw"] },
  { id:"n12", name:"N12", lang:"iw", type:"rss", site:"https://www.n12.co.il",
    feeds:["https://news.google.com/rss/search?q=site:n12.co.il+when:1d&hl=iw&gl=IL&ceid=IL:iw",
           "https://news.google.com/rss/search?q=site:n12.co.il&hl=iw&gl=IL&ceid=IL:iw"] },
  { id:"c14", name:"ערוץ 14", lang:"iw", type:"rss", site:"https://www.c14.co.il",
    feeds:["https://news.google.com/rss/search?q=site:c14.co.il+when:1d&hl=iw&gl=IL&ceid=IL:iw",
           "https://news.google.com/rss/search?q=site:c14.co.il&hl=iw&gl=IL&ceid=IL:iw"] },
  { id:"calcalist", name:"כלכליסט", lang:"iw", type:"rss", site:"https://www.calcalist.co.il",
    feeds:["https://www.calcalist.co.il/GeneralRSS.aspx",
           "https://news.google.com/rss/search?q=site:calcalist.co.il+when:1d&hl=iw&gl=IL&ceid=IL:iw"] },
  { id:"globes", name:"גלובס", lang:"iw", type:"rss", site:"https://www.globes.co.il",
    feeds:["https://www.globes.co.il/webservice/rss/rssfeeds.asmx/GetFeedArticles?CategoryId=0",
           "https://news.google.com/rss/search?q=site:globes.co.il+when:1d&hl=iw&gl=IL&ceid=IL:iw"] },
  { id:"themarker", name:"דה מרקר", lang:"iw", type:"merged", site:"https://www.themarker.com",
    feeds:["https://www.themarker.com/srv/tm-markets","https://www.themarker.com/srv/tm-global"] },
];

// ══════════════════════════════════════════════
// PROXIES RSS
// ══════════════════════════════════════════════
const PROXIES = [
  async u => {
    const r = await fetch(`https://api.rss2json.com/v1/api.json?count=9&rss_url=${encodeURIComponent(u)}`);
    if(!r.ok) throw new Error(`rss2json ${r.status}`);
    const d = await r.json();
    if(d.status!=="ok") throw new Error(d.message);
    return d.items.slice(0,9).map(i=>({title:stripHtml(i.title||""),link:i.link||"",pubDate:i.pubDate||"",teaser:stripHtml(i.description||i.content||"")}));
  },
  async u => {
    const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`);
    if(!r.ok) throw new Error(`allorigins ${r.status}`);
    return parseXML(await r.text());
  },
  async u => {
    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(u)}`);
    if(!r.ok) throw new Error(`corsproxy ${r.status}`);
    return parseXML(await r.text());
  },
  async u => {
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`);
    if(!r.ok) throw new Error(`allorigins/get ${r.status}`);
    const d = await r.json();
    if(!d.contents) throw new Error("vacío");
    return parseXML(d.contents);
  },
];

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function parseXML(xml) {
  const doc = new DOMParser().parseFromString(xml,"text/xml");
  if(doc.querySelector("parsererror")) throw new Error("XML inválido");
  const items = Array.from(doc.querySelectorAll("item")).slice(0,9);
  if(!items.length) throw new Error("Sin artículos");
  return items.map(i=>({
    title:stripHtml(i.querySelector("title")?.textContent||""),
    link:i.querySelector("link")?.textContent||"",
    pubDate:i.querySelector("pubDate")?.textContent||"",
    teaser:stripHtml(i.querySelector("description")?.textContent||i.querySelector("summary")?.textContent||""),
  }));
}
function stripHtml(s){
  return s.replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g,"$1").replace(/<[^>]+>/g,"")
    .replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&amp;/g,"&")
    .replace(/&nbsp;/g," ").replace(/&#[0-9]+;/g,"").replace(/&quot;/g,'"').trim();
}
function formatDate(str){
  if(!str) return "";
  try{
    const d=new Date(str); if(isNaN(d)) return "";
    const diff=Math.round((Date.now()-d)/60000);
    if(diff<2) return "ahora";
    if(diff<60) return `hace ${diff} min`;
    if(diff<120) return "hace 1 h";
    if(diff<1440) return `hace ${Math.round(diff/60)} h`;
    return d.toLocaleDateString("es-AR",{day:"numeric",month:"short"});
  }catch{return "";}
}

// ══════════════════════════════════════════════
// READER — extrae texto con Readability.js
// ══════════════════════════════════════════════
let activeCard = null;

// Proxies para fetch del artículo (HTML crudo)
const HTML_PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
];

async function fetchArticleHTML(url) {
  // allorigins /raw
  try {
    const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    if(r.ok){
      const html = await r.text();
      if(html && html.length > 500) return html;
    }
  } catch{}
  // corsproxy.io
  try {
    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    if(r.ok){
      const html = await r.text();
      if(html && html.length > 500) return html;
    }
  } catch{}
  // allorigins /get (devuelve JSON con .contents)
  try {
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    if(r.ok){
      const d = await r.json();
      if(d.contents && d.contents.length > 500) return d.contents;
    }
  } catch{}
  throw new Error("No se pudo obtener el artículo.");
}

async function openReader(url, title, sourceName, lang, cardEl, teaser) {
  // Marcar card activa
  if(activeCard) activeCard.classList.remove("active");
  activeCard = cardEl;
  cardEl.classList.add("active");

  // Abrir paneles con animación
  document.getElementById("feeds-panel").classList.add("narrow");
  document.getElementById("reader-panel").classList.add("open");

  // Header del lector
  document.getElementById("reader-source").textContent = sourceName;
  document.getElementById("reader-headline").textContent = title;
  document.getElementById("reader-ext").href = url;

  // Mostrar spinner
  const scroll = document.getElementById("reader-scroll");
  scroll.innerHTML = `<div class="reader-loading"><span class="spinner spinner-lg"></span><span>Extrayendo artículo...</span></div>`;

  try {
    const html = await fetchArticleHTML(url);

    // Parsear con Readability
    const doc = new DOMParser().parseFromString(html, "text/html");

    // Resolver URLs relativas para imágenes
    const base = doc.createElement("base");
    base.href = url;
    doc.head.appendChild(base);

    const reader = new Readability(doc, { charThreshold: 100 });
    const article = reader.parse();

    if(!article || !article.content || article.content.length < 100) {
      throw new Error("paywall");
    }

    // Detectar dirección (hebreo = RTL)
    const isRTL = lang === "iw" || /[\u0590-\u05FF]/.test(article.title || title);
    const dir = isRTL ? 'dir="rtl"' : '';

    // Imagen destacada (si hay)
    let leadImg = "";
    const tmpDoc = new DOMParser().parseFromString(article.content, "text/html");
    const firstImg = tmpDoc.querySelector("img");
    if(firstImg && firstImg.src && firstImg.src.startsWith("http")) {
      leadImg = `<img class="reader-lead-img" src="${firstImg.src}" alt="" onerror="this.style.display='none'">`;
      firstImg.remove();
    }

    // Renderizar
    scroll.innerHTML = `
      <div class="reader-article" ${dir}>
        <h1>${article.title || title}</h1>
        <div class="reader-meta">
          ${sourceName ? `<span>${sourceName}</span>` : ""}
          ${article.byline ? `<span>${article.byline}</span>` : ""}
          ${article.publishedTime ? `<span>${new Date(article.publishedTime).toLocaleDateString("es-AR",{day:"numeric",month:"long",year:"numeric"})}</span>` : ""}
        </div>
        ${leadImg}
        <div class="reader-body" ${dir}>${tmpDoc.body.innerHTML}</div>
      </div>`;

  } catch(e) {
    const isRTL = lang === "iw";
    const dir = isRTL ? 'dir="rtl"' : '';
    const cleanTeaser = (teaser||"").slice(0, 600).trim();

    scroll.innerHTML = `
      <div class="reader-article" ${dir}>
        <h1>${title}</h1>
        <div class="reader-meta"><span>${sourceName}</span></div>

        <!-- Paywall banner -->
        <div class="paywall-banner">
          <div class="paywall-icon">🔒</div>
          <div class="paywall-text">
            <strong>Contenido de pago</strong>
            <span>Este artículo requiere suscripción a ${sourceName}.</span>
          </div>
          <a class="paywall-btn" href="${url}" target="_blank" rel="noopener">Leer en ${sourceName} →</a>
        </div>

        ${cleanTeaser ? `
        <div class="paywall-teaser" ${dir}>
          <div class="paywall-teaser-label">Lo que publica el medio:</div>
          <p>${cleanTeaser}${cleanTeaser.length >= 600 ? "…" : ""}</p>
        </div>` : ""}
      </div>`;
  }
}

function closeReader() {
  if(activeCard){ activeCard.classList.remove("active"); activeCard=null; }
  document.getElementById("feeds-panel").classList.remove("narrow");
  document.getElementById("reader-panel").classList.remove("open");
}

document.addEventListener("keydown", e => { if(e.key==="Escape") closeReader(); });

// ══════════════════════════════════════════════
// CARGA DE FEEDS
// ══════════════════════════════════════════════
async function loadFeed(source){
  const grid = document.getElementById(`grid-${source.id}`);
  let lastErr = "";
  const tryAll = async () => {
    if(source.type==="merged"){
      const all=[];
      for(const fu of source.feeds){
        for(const p of PROXIES){
          try{const a=await p(fu);all.push(...a);break;}catch(e){lastErr=e.message;}
        }
      }
      if(!all.length) throw new Error(lastErr);
      all.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));
      const seen=new Set();
      return all.filter(a=>{if(seen.has(a.title))return false;seen.add(a.title);return true;}).slice(0,9);
    } else {
      for(const fu of source.feeds){
        for(const p of PROXIES){ try{return await p(fu);}catch(e){lastErr=e.message;} }
      }
      throw new Error(lastErr);
    }
  };
  try{
    const arts = await tryAll();
    // Guardar artículos en el grid para el click handler
    grid._arts = arts;
    grid.innerHTML = arts.map((a,i)=>`
      <div class="article-card" data-idx="${i}">
        ${a.pubDate?`<div class="article-time">${formatDate(a.pubDate)}</div>`:""}
        <div class="article-title">${a.title||"Sin título"}</div>
      </div>`).join("");
    grid.querySelectorAll(".article-card").forEach(card=>{
      card.addEventListener("click",()=>{
        const a = grid._arts[+card.dataset.idx];
        if(a) openReader(a.link||"#", a.title||"Sin título", source.name, source.lang, card, a.teaser||"");
      });
    });
  }catch(e){
    grid.innerHTML=`<div class="state-card error">⚠ No se pudo cargar ${source.name}<br><small>${e.message}</small></div>`;
  }
}

// ══════════════════════════════════════════════
// NAV / FILTRO
// ══════════════════════════════════════════════
function filterSources(id,btn){
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");
  document.querySelectorAll(".source-section").forEach(s=>{
    s.classList.toggle("hidden",id!=="all"&&s.dataset.id!==id);
  });
}

// ══════════════════════════════════════════════
// BUILD LAYOUT
// ══════════════════════════════════════════════
function build(){
  const panel = document.getElementById("feeds-panel");
  const nav   = document.getElementById("nav");
  SOURCES.forEach(src=>{
    const btn=document.createElement("button");
    btn.className="nav-btn"; btn.textContent=src.name;
    btn.onclick=()=>filterSources(src.id,btn);
    nav.appendChild(btn);
    const sec=document.createElement("section");
    sec.className="source-section"; sec.dataset.id=src.id;
    sec.innerHTML=`
      <div class="source-header">
        <span class="source-name">${src.name}</span>
        <span class="source-badge">${src.lang==="en"?"EN":"עברית"}</span>
        <a class="source-link" href="${src.site}" target="_blank" rel="noopener">↗ ${src.site.replace("https://www.","")}</a>
      </div>
      <div class="articles-grid" id="grid-${src.id}">
        <div class="state-card"><span class="spinner"></span>Esperando...</div>
      </div>`;
    panel.appendChild(sec);
  });
  adjustHeight();
  window.addEventListener("resize", adjustHeight);
}

function adjustHeight(){
  const hh = document.getElementById("site-header").offsetHeight
           + document.getElementById("site-toolbar").offsetHeight
           + 2; // prog-wrap
  const playerH = 64; // player bar fija
  document.getElementById("app-body").style.height = `calc(100vh - ${hh + playerH}px)`;
}

// ══════════════════════════════════════════════
// LOAD ALL
// ══════════════════════════════════════════════
async function loadAll(){
  const btn=document.getElementById("refresh-btn");
  const prog=document.getElementById("prog-bar");
  const progWrap=document.getElementById("prog-wrap");
  const status=document.getElementById("status");
  const lastUpd=document.getElementById("last-upd");
  btn.disabled=true; btn.textContent="↻ Cargando...";
  progWrap.style.display="block"; prog.style.width="0%";
  SOURCES.forEach(s=>{
    const g=document.getElementById(`grid-${s.id}`);
    if(g) g.innerHTML=`<div class="state-card"><span class="spinner"></span>Cargando...</div>`;
  });
  let done=0;
  status.textContent=`0 / ${SOURCES.length} fuentes...`;
  await Promise.all(SOURCES.map(async src=>{
    await loadFeed(src); done++;
    prog.style.width=Math.round(done/SOURCES.length*100)+"%";
    status.textContent=`${done} / ${SOURCES.length}`;
  }));
  const now=new Date();
  lastUpd.textContent=`${now.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}`;
  status.textContent=`${now.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}`;
  btn.disabled=false; btn.textContent="↻ Actualizar";
  setTimeout(()=>{progWrap.style.display="none";prog.style.width="0%";},800);
}

// ══════════════════════════════════════════════
// RELOJ
// ══════════════════════════════════════════════
function tick(){
  const n=new Date();
  document.getElementById("the-date").textContent=n.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  document.getElementById("the-time").textContent=n.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
build(); tick(); setInterval(tick,1000); loadAll();

// ══════════════════════════════════════════════

const PB_SOURCES = [
  {
    id: "kanbet",
    name: "Kan Bet",
    type: "hls",
    streams: [
      "https://icecast2.kan.org.il/reshet_bet",
      "https://icecastb.kan.org.il/reshet_bet",
      "https://playerservices.streamtheworld.com/api/livestream-redirect/KAN_BET.mp3",
    ]
  },
  {
    id: "kan11",
    name: "Kan 11",
    type: "hls",
    streams: [
      "https://kancdn.medonecdn.net/livehls/oil/kancdn-live/live/kan11/live.livx/playlist.m3u8",
    ]
  },
  {
    id: "kanes",
    name: "Kan ES",
    type: "youtube",
    videoId: "I2GTdH-nFeU",
    list: "PLH_PZVT1DLipiq8ey31Hju-SVusGU278o",
  },
];

let pbActive = null;   // id de fuente activa
let pbPlaying = false;
let pbSession = 0;     // token — invalida callbacks async de sesiones anteriores
let pbAudio = null;    // elemento <audio> del DOM (reutilizado)
let pbHls = null;      // instancia hls.js activa
let pbAudioIdx = 0;
let pbYTEl = null;

// Construir botones de fuente
function pbBuild() {
  const container = document.getElementById("pb-sources");
  PB_SOURCES.forEach(src => {
    const btn = document.createElement("div");
    btn.className = "pb-src";
    btn.id = "pb-src-" + src.id;
    btn.innerHTML = `<span class="pb-src-name">${src.name}</span>`;
    btn.onclick = () => pbSelectSource(src.id);
    container.appendChild(btn);
  });
}

function pbSetStatus(txt) {
  document.getElementById("pb-status").textContent = txt;
}

function pbSetPlayBtn(playing) {
  const btn = document.getElementById("pb-play");
  btn.textContent = playing ? "⏸" : "▶";
  btn.classList.toggle("on", playing);
  pbPlaying = playing;
}

// Detener TODO — garantiza que no queden fuentes solapadas
function pbStopAll() {
  pbSession++;
  // Destruir hls.js
  if(pbHls) { try { pbHls.stopLoad(); pbHls.destroy(); } catch(e){} pbHls = null; }
  // Pausar y limpiar audio
  if(pbAudio) { pbAudio.pause(); pbAudio.src = ""; pbAudio = null; }
  // YouTube
  if(pbYTEl) { pbYTEl.src = "about:blank"; pbYTEl = null; }
  document.getElementById("pb-iframes").innerHTML = "";
  const cont = document.getElementById("pb-iframes");
  cont.style.cssText = "position:fixed;bottom:60px;right:0;width:1px;height:1px;overflow:hidden;pointer-events:none";
  pbSetPlayBtn(false);
  pbSetStatus("—");
}

function pbSelectSource(id) {
  if(pbActive === id && pbPlaying) { pbStopAll(); pbActive = null; pbUpdateActive(null); return; }
  pbStopAll();
  pbActive = id;
  pbUpdateActive(id);
  pbStartSource(id);
}

function pbUpdateActive(id) {
  document.querySelectorAll(".pb-src").forEach(b => b.classList.remove("active"));
  if(id) document.getElementById("pb-src-" + id)?.classList.add("active");
}

function pbStartSource(id) {
  const src = PB_SOURCES.find(s => s.id === id);
  if(!src) return;
  if(src.type === "hls") {
    pbAudioIdx = 0;
    pbTryStream(src, pbSession);
  } else if(src.type === "youtube") {
    pbStartYoutube(src);
  }
}

// ── Audio directo (Kan Bet, Kan 11) ────────────────────
function pbTryStream(src, session) {
  if(session !== pbSession) return;
  if(pbAudioIdx >= src.streams.length) { pbSetStatus("Sin señal ✕"); pbSetPlayBtn(false); return; }
  const url = src.streams[pbAudioIdx];
  const vol = parseFloat(document.getElementById("pb-vol").value);
  pbSetStatus("Conectando...");

  // Limpiar estado anterior
  if(pbHls) { try { pbHls.destroy(); } catch(e){} pbHls = null; }
  if(pbAudio) { pbAudio.pause(); pbAudio.src = ""; pbAudio = null; }

  const a = new Audio();
  a.volume = vol;
  pbAudio = a;

  const onPlay  = () => { if(session!==pbSession){a.pause();return;} pbSetStatus("En vivo ●"); pbSetPlayBtn(true); };
  const onPause = () => { if(session!==pbSession) return; pbSetStatus("Pausado"); pbSetPlayBtn(false); };
  const onError = () => { if(session!==pbSession) return; pbAudioIdx++; pbTryStream(src,session); };

  a.addEventListener("playing", onPlay);
  a.addEventListener("pause",   onPause);
  a.addEventListener("stalled", () => { setTimeout(()=>{ if(session!==pbSession)return; if(a.readyState<3){pbAudioIdx++;pbTryStream(src,session);} },5000); });

  if(url.includes(".m3u8") && Hls.isSupported()) {
    const hls = new Hls({ maxBufferLength: 10, startLevel: -1 });
    pbHls = hls;
    hls.loadSource(url);
    hls.attachMedia(a);
    hls.on(Hls.Events.ERROR, (ev, data) => {
      if(session !== pbSession) return;
      if(data.fatal) { pbAudioIdx++; pbTryStream(src, session); }
    });
    a.play().catch(onError);
  } else {
    // MP3/AAC directo
    a.addEventListener("error", onError);
    a.src = url;
    a.play().catch(onError);
  }
}

// ── iFrame (CNN / Fox / MSNBC) ─────────────────────────
function pbSyncIframeVol(iframe, vol) {
  try {
    const v = iframe.contentDocument?.querySelector("video");
    if(v) v.volume = vol;
  } catch(e) {}
}

// ── YouTube (Kan Español) ───────────────────────────────
function pbStartYoutube(src) {
  pbSetStatus("Cargando...");
  const container = document.getElementById("pb-iframes");
  container.innerHTML = "";
  const iframe = document.createElement("iframe");
  iframe.id = "pb-if-youtube";
  iframe.src = `https://www.youtube.com/embed/${src.videoId}?list=${src.list}&listType=playlist&autoplay=1&controls=1&mute=0`;
  iframe.allow = "autoplay; encrypted-media; picture-in-picture";
  iframe.style.cssText = "width:240px;height:135px;border:none;display:block";
  container.appendChild(iframe);
  // Mini-player visible en esquina para que el browser permita autoplay
  container.style.cssText = "position:fixed;bottom:64px;right:8px;width:240px;height:135px;overflow:hidden;pointer-events:none;border:1px solid #444;border-radius:4px;background:#000;z-index:999";
  pbYTEl = iframe;
  iframe.onload = () => { pbSetStatus("Reproduciendo ●"); pbSetPlayBtn(true); };
}

// ── Toggle play/pause ───────────────────────────────────
function pbToggle() {
  if(!pbActive) return;
  if(pbPlaying) {
    // Pausar
    if(pbAudio) { pbAudio.pause(); }
    else { pbStopAll(); pbActive = null; pbUpdateActive(null); }
  } else {
    // Reanudar / reiniciar
    if(pbAudio) {
      pbAudio.play().catch(() => {});
    } else if(pbActive) {
      pbStartSource(pbActive);
    }
  }
}

// ── Volumen ─────────────────────────────────────────────
function pbSetVol(v) {
  const vol = parseFloat(v);
  if(pbAudio) pbAudio.volume = vol;
}

// Init
pbBuild();</script>
